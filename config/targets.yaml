# Financial targets to forecast. Same predictor library feeds both.
#
# NOTE on target choice (decided 2026-05-02): the original plan's HY/IG OAS
# series (FRED BAMLH0A0HYM2 / BAMLC0A0CM) were truncated by FRED to start
# 2023-05-02 — too short for the locked 2008+ training window. We instead
# forecast the corresponding US HY and IG corporate-bond ETFs (HYG, LQD) via
# yfinance, which give full daily history back to 2007-04 (HYG) / 2002-07
# (LQD). ETF total-return prices are modeled in levels by v1/v2.0; v2.1's
# Phase D.1 grid (see comparison_table_v21.csv) showed log_diff wins on
# Brier and AUC for both targets, so v2.1 locks transform: log_diff per
# target. If institutional ICE BofA OAS data becomes available, swap
# source: csv and point ticker at a local CSV path.

targets:
  - name: HY
    description: "iShares iBoxx $ High Yield Corporate Bond ETF (HYG) — proxy for HY OAS"
    source: yfinance
    ticker: HYG
    units: usd_total_return
    # v2.1 D.1: log_diff beat levels on Brier (0.229 < 0.360) and AUC (0.68 > 0.45).
    # Note: levels stays sane for the v2.0 reports (notebooks 04/07) which were
    # already published; v2.1 onward and v3 use log_diff per this lock.
    transform: log_diff
    frequency: weekly
    week_anchor: SUN

  - name: IG
    description: "iShares iBoxx $ Investment Grade Corporate Bond ETF (LQD) — proxy for IG OAS"
    source: yfinance
    ticker: LQD
    units: usd_total_return
    # v2.1 D.1: log_diff beat levels on Brier (0.221 < 0.356) and AUC (0.72 > 0.45).
    transform: log_diff
    frequency: weekly
    week_anchor: SUN

  # ---- v5.1 OAS-direct targets (user-supplied FRED CSVs, 2023-05+) ----
  # 2026-05-25: with the user-supplied FRED BAML CSVs in data/csv/, we now
  # have ~156 weeks of HY_OAS / IG_OAS history. These rows enable a
  # separate small "OAS Tail-Risk Monitor" BSTS fit with train_window=52
  # (per-target override in config/model.yaml::backtest.train_window_per_target),
  # shipped alongside the ETF proxies as an auxiliary view. The ETF
  # proxies above remain the primary headline — the OAS-direct fit's
  # small-N risk is documented in docs/RESULTS.md and surfaced at
  # freeze time. Series are generated by:
  #   PYTHONPATH=src python3 scripts/oas_overlay_v3.py --write-targets
  - name: HY_OAS
    description: "ICE BAML US HY OAS (BAMLH0A0HYM2), weekly Sunday-anchored bps"
    source: parquet
    path: data/raw/targets/HY_OAS.parquet
    units: bps
    transform: diff
    frequency: weekly
    week_anchor: SUN

  - name: IG_OAS
    description: "ICE BAML US IG OAS (BAMLC0A0CM), weekly Sunday-anchored bps"
    source: parquet
    path: data/raw/targets/IG_OAS.parquet
    units: bps
    transform: diff
    frequency: weekly
    week_anchor: SUN

  # ---- WRDS-aggregate-OAS deferred (see context from 2026-05-12) ----
  # UChicago's WRDS subscription does NOT carry the aggregate ICE BAML
  # OAS index series — only individual-bond data with no `oas` column.
  # Building synthetic HY/IG OAS from `bondret` would require Treasury
  # matching across maturities for 4.3M rows ("too much engineering" per
  # v3 plan §A.2.5) and would be monthly cadence which breaks the daily-
  # horizon story. `data/oas.py` + `scripts/pull_oas.py` stay as stubs for
  # the day Bloomberg / paid Nasdaq Data Link unlocks the 2008-anchored
  # full-history series; the parquet-source rows above use the 3-year
  # FRED slice as a stopgap.

# ---- Always-included macro controls (prior inclusion = 1.0 in bsts) ----
controls:
  - name: vix
    source: fred
    ticker: VIXCLS
    transform: log_diff
  - name: ust10y
    source: fred
    ticker: DGS10
    transform: diff
  - name: ust2y10y_slope
    source: derived
    formula: "DGS10 - DGS2"     # computed in features.library
    transform: levels

window:
  start: "2008-01-01"
  end: "2026-04-30"
  train_end: "2018-12-31"
  test_start: "2019-01-01"
